name: Build QMK firmware

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    name: 'QMK Userspace Build'
    uses: qmk/.github/.github/workflows/qmk_userspace_build.yml@main
    with:
      qmk_repo: qmk/qmk_firmware
      qmk_ref: master
      preparation_command: |
        # Materialize the userspace keymap symlinks (scoped to our keyboards/ tree:
        # `find .` would also walk the qmk_firmware checkout and choke on its symlinks)
        find keyboards -type l | while read link; do
          target=$(readlink -f "$link") || { echo "Unresolvable symlink: $link" >&2; exit 1; }
          rm "$link"
          cp -r "$target" "$link"
        done
        cp -r keyboards/42keebs qmk_firmware/keyboards/

  publish:
    name: 'QMK Userspace Publish'
    uses: qmk/.github/.github/workflows/qmk_userspace_publish.yml@main
    if: always() && !cancelled()
    needs: build
