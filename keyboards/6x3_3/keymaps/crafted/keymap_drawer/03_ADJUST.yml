        - [
              { type: none },
              { t: F1, type: editing },
              { t: F2, type: editing },
              { t: F3, type: editing },
              { t: F4, type: editing },
              { t: F5, type: editing },
              { t: F6, type: editing },
              { t: F7, type: editing },
              { t: F8, type: editing },
              { t: F9, type: editing },
              { t: F10, type: editing },
              { type: none },
          ]
        - [
              { t: $$mdi:restart$$, h: "Boot", type: danger },
              { t: "OS ⇄", type: system },
              { type: none },
              { type: none },
              { type: none },
              { t: F11, type: editing },
              { t: F12, type: editing },
              { t: $$mdi:volume-mute$$, type: system },
              { t: $$mdi:volume-plus$$, type: system },
              { t: $$mdi:brightness-7$$, type: system },
              { t: "Layout ⇄", type: system },
              { t: "▽", type: trans },
          ]
        - [
              { type: none },
              { t: "OS ?", type: system },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { t: $$mdi:monitor-screenshot$$, h: "Prt Scr", type: system },
              { t: $$mdi:volume-minus$$, type: system },
              { t: $$mdi:brightness-5$$, type: system },
              { t: "Layout ?", type: system },
              { type: none },
          ]
        - [
              { t: "▽", type: trans },
              { t: "▽", type: trans },
              { type: held },
              { type: held },
              { t: "▽", type: trans },
              { t: "▽", type: trans },
          ]

draw_config:
    key_h: 60
    append_colon_to_layer_header: false
    svg_extra_style: |
        /* Two-tier palette: pale fills = content regions (ambient), vivid = behavior */
        /* Tier 1 - ambient content categories (default dark text) */
        /* Palette: grey = alphas/trans (default), white = unused, green = symbols,
           purple = layers, blue = navigation (incl. latches), orange = everything else */
        .key.none rect { fill: white; }
        .key.symbol rect { fill: #e9f5f0; stroke: #bedfd2; }
        .key.layer rect { fill: #ead9eb; stroke: #9a5fa1; }
        .key.layer :not(rect) { fill: #9a5fa1; }
        .key.nav rect { fill: #dbe9f8; stroke: #6b97c9; }
        .key.delhold :not(rect) { fill: #d6453a; }
        .key.editing rect, .key.state rect, .key.danger rect, .key.modifier rect { fill: #fdebd9; stroke: #dd9d57; }
        .key.system rect { fill: #f9f0c9; stroke: #cdb94e; }
        .key.modifier :not(rect) { fill: #b06c1f; }
        .key.modtap.hold { fill: #4a7ab8; font-weight: bold; }
        .key.held rect { fill: url(#stripes); stroke: #999999; }
        .combo.state rect { fill: #fdebd9; stroke: #dd9d57; }
        .combo.symbol rect { fill: #e9f5f0; stroke: #bedfd2; }
