layout:
    qmk_keyboard: cantor
    layout_name: LAYOUT_split_3x6_3

layers:
    FAVS:
        - [
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { t: PgUp, type: nav },
              { t: "L←", type: nav },
              { t: $$mdi:arrow-up$$, type: nav },
              { t: "L→", type: nav },
              { type: none },
              { type: none },
          ]
        - [
              { t: $$mdi:keyboard-esc$$, type: editing },
              { t: $$mdi:lock-outline$$, h: "Layer Lock", type: layer },
              { t: $$mdi:backspace-outline$$, h: "Delete (hold)", type: nav },
              { t: $$mdi:apple-keyboard-shift$$, h: "Latch", type: nav },
              { t: $$mdi:star-four-points-box$$, h: "GUI/Ctrl", type: modtap },
              { t: $$mdi:swap-horizontal$$, type: state },
              { t: PgDn, type: nav },
              { t: $$mdi:arrow-left$$, type: nav },
              { t: $$mdi:arrow-down$$, type: nav },
              { t: $$mdi:arrow-right$$, type: nav },
              { type: none },
              { t: Del, type: editing },
          ]
        - [
              { t: "▽", type: trans },
              { t: Undo, type: system },
              { t: Cut, type: system },
              { t: Copy, type: system },
              { t: Paste, type: system },
              { type: none },
              { type: none },
              { t: "W←", type: nav },
              { type: none },
              { t: "W→", type: nav },
              { type: none },
              { t: "▽", type: trans },
          ]
        - [
              { t: "▽", type: trans },
              { t: "▽", type: trans },
              { type: none },
              { t: $$mdi:layers-triple-outline$$, h: "ADJUST", type: layer },
              { t: "▽", type: trans },
              { t: "▽", type: trans },
          ]

draw_config:
    key_h: 60
    append_colon_to_layer_header: false
    svg_extra_style: |
        /* Two-tier palette: pale fills = content regions (ambient), vivid = behavior */
        /* Tier 1 - ambient content categories (default dark text) */
        /* Palette: grey = alphas/trans (default), white = unused, green = symbols,
           purple = layers, blue = navigation (incl. latches), orange = everything else */
        .key.none rect { fill: white; }
        .key.symbol rect { fill: #e9f5f0; stroke: #bedfd2; }
        .key.layer rect { fill: #ead9eb; stroke: #9a5fa1; }
        .key.layer :not(rect) { fill: #9a5fa1; }
        .key.nav rect { fill: #dbe9f8; stroke: #6b97c9; }
        .key.editing rect, .key.system rect, .key.state rect, .key.danger rect, .key.modifier rect { fill: #fdebd9; stroke: #dd9d57; }
        .key.modifier :not(rect) { fill: #b06c1f; }
        .key.modtap.hold { fill: #4a7ab8; font-weight: bold; }
        .key.held rect { fill: url(#stripes); stroke: #999999; }
        .combo.state rect { fill: #fdebd9; stroke: #dd9d57; }
        .combo.symbol rect { fill: #e9f5f0; stroke: #bedfd2; }
