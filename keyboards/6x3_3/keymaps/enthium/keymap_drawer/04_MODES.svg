<text x="435.0" y="484.5" font-size="12.5" text-anchor="middle" fill="#36322e">Select page up</text>
<text x="637.0" y="484.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="839.0" y="484.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="86.0" y="511.5" font-size="12" style="font-family:SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" text-anchor="middle" fill="#36322e">PgDn</text>
<text x="233.0" y="511.5" font-size="12.5" text-anchor="middle" fill="#36322e">Page down</text>
<text x="435.0" y="511.5" font-size="12.5" text-anchor="middle" fill="#36322e">Select page down</text>
<text x="637.0" y="511.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="839.0" y="511.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="86.0" y="538.5" font-size="17" style="font-family:SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" text-anchor="middle" fill="#36322e">●</text>
<text x="233.0" y="538.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="435.0" y="538.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="637.0" y="538.5" font-size="12.5" text-anchor="middle" fill="#b9b0a6">·</text>
<text x="839.0" y="538.5" font-size="12.5" text-anchor="middle" fill="#36322e">Reopen tab</text>
<text x="40" y="573" font-size="11.5" fill="#8a8076"><tspan font-weight="700" fill="#b9b0a6">·</tspan>  no special role in that mode — the key keeps its Navigation behaviour.   Tab actions are OS-aware (Firefox &amp; Chrome, macOS &amp; Linux).</text>
<text x="40" y="590" font-size="11.5" fill="#8a8076">Select and Delete are mutually exclusive — starting a deletion clears an active selection latch.</text>
</svg>
