<text x="514.0" y="151" font-size="12.5" fill="#36322e"><tspan font-weight="600">Engage</tspan>  Hold</text>
<text x="514.0" y="171" font-size="12.5" fill="#8a8076"><tspan font-weight="600">Exit</tspan>  Release (hold-only)</text>
