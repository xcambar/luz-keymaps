<text x="468.0" y="125" font-size="12.5" font-style="italic" text-anchor="end" fill="#0d7c7c">Sl⊙</text>
<text x="285.0" y="151" font-size="12.5" fill="#36322e"><tspan font-weight="600">Engage</tspan>  Tap — toggle</text>
<text x="285.0" y="171" font-size="12.5" fill="#8a8076"><tspan font-weight="600">Exit</tspan>  Tap again / Esc</text>
<rect x="499.5" y="100.5" width="213.0" height="92" rx="8" ry="8" fill="#3a2f25" opacity="0.10" filter="url(#sh)"/>
<rect x="498.0" y="98" width="213.0" height="92" rx="8" ry="8" fill="#f7ddd9" stroke="#c25f54" stroke-width="1.3"/>
<text x="514.0" y="126" font-size="17" font-weight="700" fill="#bb554a">Delete</text>
