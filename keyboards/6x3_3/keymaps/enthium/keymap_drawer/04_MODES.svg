<text x="86.0" y="403.5" font-size="14" style="font-family:SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" text-anchor="middle" fill="#36322e">▶▶</text>
<text x="233.0" y="403.5" font-size="12.5" text-anchor="middle" fill="#36322e">Word forward</text>
<text x="435.0" y="403.5" font-size="12.5" text-anchor="middle" fill="#36322e">Select word forward</text>
