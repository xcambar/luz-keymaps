<text x="839.0" y="349.5" font-size="12.5" text-anchor="middle" fill="#36322e">Close tab</text>
<text x="86.0" y="376.5" font-size="14" style="font-family:SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" text-anchor="middle" fill="#36322e">◀◀</text>
