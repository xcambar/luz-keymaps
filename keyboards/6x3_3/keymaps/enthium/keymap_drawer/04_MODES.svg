<text x="239.0" y="125" font-size="12.5" font-style="italic" text-anchor="end" fill="#2f5a86">base</text>
<text x="56.0" y="151" font-size="12.5" fill="#36322e"><tspan font-weight="600">Engage</tspan>  Hold the EXTEND key</text>
<text x="56.0" y="171" font-size="12.5" fill="#8a8076"><tspan font-weight="600">Exit</tspan>  Release (or Layer Lock)</text>
<rect x="270.5" y="100.5" width="213.0" height="92" rx="8" ry="8" fill="#3a2f25" opacity="0.10" filter="url(#sh)"/>
<rect x="269.0" y="98" width="213.0" height="92" rx="8" ry="8" fill="#d9ecec" stroke="#0d8b8b" stroke-width="1.3"/>
