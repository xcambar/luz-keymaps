layout:
    qmk_keyboard: cantor
    layout_name: LAYOUT_split_3x6_3

# Generic Luz EXTEND — the navigation cluster (right hand) plus the clipboard, window-switch and
# Select keys (left). The sub-mode layer keys (Delete/Tabs triggers), the layer-lock, and Del/Esc
# are dropped to blanks so the cursor cluster and editing actions stand on their own.
layers:
    "EXTEND — navigation & editing":
        - [
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { t: PgUp, type: nav },
              { t: "⏮", type: nav lineedge },
              { t: "▲", type: nav },
              { t: "⏭", type: nav lineedge },
              { type: none },
              { type: none },
          ]
        - [
              { type: none },
              { type: none },
              {
                  s: hold,
                  t: $$mdi:backspace-outline$$,
                  h: delete,
                  type: nav delhold mode,
              },
              {
                  s: hold,
                  t: $$mdi:tab$$,
                  h: tabs,
                  type: nav tabmode mode,
              },
              {
                  s: hold,
                  t: $$mdi:selection$$,
                  h: select,
                  type: nav selmode mode,
              },
              { t: $$mdi:swap-horizontal$$, type: state, h: "win swap" },
              { t: PgDn, type: nav },
              { t: "◀", type: nav },
              { t: "▼", type: nav },
              { t: "▶", type: nav },
              { type: none },
              { type: none },
          ]
        - [
              { type: none },
              { t: Undo, type: system },
              { t: Cut, type: system },
              { t: Copy, type: system },
              { t: Paste, type: system },
              { type: none },
              { type: none },
              { t: "◀◀", type: nav },
              { type: none },
              { t: "▶▶", type: nav },
              { type: none },
              { type: none },
          ]
        - [
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
              { type: none },
          ]

draw_config:
    key_h: 60
    glyph_shifted_size: 10
    append_colon_to_layer_header: false
    svg_extra_style: |
        /* Two-tier palette: pale fills = content regions (ambient), vivid = behavior */
        svg.keymap { fill: #36322e; }
        .key.none rect.key { fill: #efeae1; stroke: #e3ddd2; }
        .key.symbol rect.key { fill: #e9f5f0; stroke: #bedfd2; }
        .key.layer rect.key { fill: #ead9eb; stroke: #9a5fa1; }
        .key.layer.tap, .key.layer.hold, .key.layer.shifted { fill: #9a5fa1; }
        .key.nav rect.key { fill: #dbe9f8; stroke: #6b97c9; }
        .key.delhold.tap, .key.delhold.hold, .key.delhold.shifted { fill: #c25f54; }
        .key.tabmode.tap, .key.tabmode.hold, .key.tabmode.shifted { fill: #9a5fa1; }
        .key.selmode.tap, .key.selmode.hold, .key.selmode.shifted { fill: #0d8b8b; }
        .key.mode.shifted { font-style: italic; }
        .key.editing rect.key, .key.state rect.key, .key.danger rect.key, .key.modifier rect.key { fill: #fdebd9; stroke: #dd9d57; }
        .key.system rect.key { fill: #f9f0c9; stroke: #cdb94e; }
        .key.modifier.tap, .key.modifier.hold, .key.modifier.shifted { fill: #b06c1f; }
        .key.modtap.hold { fill: #4a7ab8; font-weight: bold; }
        .key.lineedge.tap { font-size: 25px; }
        .key.held rect.key { fill: url(#stripes); stroke: #999999; }
        .combo.state rect.key { fill: #fdebd9; stroke: #dd9d57; }
        .key.shifted { transform: translateY(2px); }
        .key.hold {transform: translateY(-2px); }
